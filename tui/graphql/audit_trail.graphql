query AuditTrail(
  $search: String
  $type: AuditTypeFilter
  $period: Period
  $limit: Int
  $offset: Int
) {
  auditTrail(
    search: $search
    type: $type
    period: $period
    limit: $limit
    offset: $offset
  ) {
    total
    limit
    offset
    items {
      timestamp
      sessionId
      sequenceNum
      provider
      model
      requestHash
      responseHash
      totalTokens
      integrityStatus
      httpStatus
      captureComplete
    }
  }
}
