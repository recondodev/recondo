# Full-stack Recondo: gateway + API + dashboard + MCP + PostgreSQL + MiniStack S3
# Everything runs in Docker.
#
# Usage:
#   just fullstack          # build and start everything
#   just fullstack-down     # stop (data preserved)
#   just fullstack-reset    # stop and wipe all data
#
# Services:
#   Gateway:    localhost:8443  (HTTPS proxy — route agents here)
#   API:        localhost:4000  (GraphQL API)
#   Dashboard:  localhost:3000  (React frontend)
#   MCP:        localhost:4001  (Streamable HTTP at /mcp)
#   PostgreSQL: localhost:5432  (database)
#   MiniStack:  localhost:4566  (S3/KMS emulation)

name: recondo

services:
  ministack:
    image: ministackorg/ministack:1.3.25
    ports:
      - "4566:4566"
    healthcheck:
      # MiniStack image has BusyBox nc (no -z flag) but does have netstat.
      test: ["CMD-SHELL", "netstat -ln | grep -q :4566"]
      interval: 5s
      timeout: 3s
      retries: 10

  ministack-init:
    image: amazon/aws-cli:2.30.5
    depends_on:
      ministack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://ministack:4566
    entrypoint: ["sh", "/init.sh"]
    volumes:
      - ./deploy/local-dev/init-aws.sh:/init.sh:ro
    restart: "no"

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: recondo
      POSTGRES_USER: recondo
      POSTGRES_PASSWORD: recondo_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/local-dev/init-gateway-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recondo"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: "postgres://recondo:recondo_dev@postgres:5432/recondo"
    command: ["sh", "-c", "pnpm run migrate up"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8443:8443"
    environment:
      RECONDO_STORE: postgres
      RECONDO_DB_URL: "postgres://recondo:recondo_dev@postgres:5432/recondo"
      # Production-like fullstack: object store on MiniStack (S3-compatible).
      # Bucket recondo-objects-dev is created by ministack-init from
      # deploy/local-dev/init-aws.sh.
      RECONDO_OBJECTS: s3
      RECONDO_S3_BUCKET: recondo-objects-dev
      AWS_ENDPOINT_URL: http://ministack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    volumes:
      - gateway_data:/home/recondo/.recondo
    depends_on:
      postgres:
        condition: service_healthy
      ministack-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgres://recondo:recondo_dev@postgres:5432/recondo"
      PORT: "4000"
      NODE_ENV: development
      # /v1/attachments/:id reads bytes from the same object store the
      # gateway writes to. With S3-backed fullstack, route via MiniStack
      # GetObject; the local-volume mount below is kept as a fallback
      # for local-mode runs.
      RECONDO_OBJECTS: s3
      RECONDO_S3_BUCKET: recondo-objects-dev
      AWS_ENDPOINT_URL: http://ministack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      RECONDO_OBJECT_ROOT: /home/recondo/.recondo/objects
    volumes:
      - gateway_data:/home/recondo/.recondo:ro
    depends_on:
      postgres:
        condition: service_healthy
      ministack-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: "postgres://recondo:recondo_dev@postgres:5432/recondo"
      PORT: "4001"
      NODE_ENV: development
      RECONDO_DEV_BYPASS: "1"
      RECONDO_MCP_HOST: "0.0.0.0"
      RECONDO_MCP_PORT: "4001"
      RECONDO_OBJECTS: s3
      RECONDO_S3_BUCKET: recondo-objects-dev
      AWS_ENDPOINT_URL: http://ministack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      ministack-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        VITE_API_URL: "http://localhost:4000"
    ports:
      - "3000:80"
    depends_on:
      - api
      - mcp

volumes:
  postgres_data:
  gateway_data:
