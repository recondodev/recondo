apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app.kubernetes.io/name: recondo-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: recondo-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8443
  egress:
    # Allow egress to upstream LLM providers and any HTTPS endpoint (MITM proxy)
    - ports:
        - protocol: TCP
          port: 443
    # Allow egress to PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    app.kubernetes.io/name: recondo-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: recondo-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    # Allow egress to control plane (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
    # Allow egress to gateway service for health checks
    - ports:
        - protocol: TCP
          port: 8443
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: recondo-gateway
              app.kubernetes.io/instance: {{ .Release.Name }}
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
