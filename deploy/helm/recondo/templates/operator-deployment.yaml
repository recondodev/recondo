apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    app.kubernetes.io/name: recondo-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: recondo-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recondo-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          args: ["operator"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          env:
            - name: RECONDO_CONTROL_PLANE
              value: {{ .Values.controlPlane.url }}
            # RECONDO_TOKEN is the operator binary's auth token (read by the operator process).
            # Distinct from RECONDO_OPERATOR_TOKEN which overrides the gateway's config module.
            - name: RECONDO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: operator-token
            - name: RECONDO_GATEWAY_SERVICE
              value: {{ .Release.Name }}-gateway
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
