apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: recondo
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  # PostgreSQL connection URI — base64 encoded
  # N4/W10 fix: required ensures deploy fails fast if URI is not provided.
  {{- if eq .Values.postgres.uri "" }}{{ fail "postgres.uri must be set (e.g., --set postgres.uri=postgres://...)" }}{{ end }}
  postgres-uri: {{ .Values.postgres.uri | b64enc | quote }}
  # Operator authentication token — base64 encoded
  {{- if eq .Values.secrets.operatorToken "" }}{{ fail "secrets.operatorToken must be set (e.g., --set secrets.operatorToken=wrt_...)" }}{{ end }}
  operator-token: {{ .Values.secrets.operatorToken | b64enc | quote }}
  # PostgreSQL password — base64 encoded. Optional: may be embedded in postgres.uri instead.
  postgres-password: {{ .Values.secrets.postgresPassword | default "" | b64enc | quote }}
