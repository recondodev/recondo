apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-gateway-pdb
  labels:
    app.kubernetes.io/name: recondo-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: recondo-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
