# Recondo canonical model pricing table (Batch 5 H4).
#
# This is the production source of truth for `compute_cost_usd`. The gateway
# embeds this file at compile time via `include_str!` and parses it once into
# a `PricingTable`. The table drives cost computation across all providers.
#
# Schema:
#   prefix              — model-name prefix (longest-prefix-match wins).
#   effective_from      — RFC3339 UTC timestamp; rates apply at-or-after.
#   input_per_m         — USD per million input tokens.
#   output_per_m        — USD per million output tokens.
#   cache_create_per_m  — USD per million cache-creation tokens (ABSOLUTE,
#                         not a multiplier; 0 for providers without the
#                         concept, e.g. OpenAI / Gemini).
#   cache_read_per_m    — USD per million cache-read tokens (ABSOLUTE).
#
# Optional [[pricing.tiers]] entries override base input/output rates when
# `input_tokens > threshold_input_tokens`. The matching tier with the highest
# threshold wins.
#
# Cache-rate semantics encoded as absolutes (per audit H4):
#   Anthropic: cache_create = input × 1.25 ; cache_read = input × 0.10
#   Gemini:    cache_create = 0           ; cache_read = input × 0.25
#   OpenAI:    cache_create = 0           ; cache_read = input × 0.50
#
# `effective_from = "2024-01-01T00:00:00Z"` is uniform across all current
# entries — these rates apply to every captured turn in the system to date.
# Future rate changes add new rows with later `effective_from` rather than
# editing existing ones.

